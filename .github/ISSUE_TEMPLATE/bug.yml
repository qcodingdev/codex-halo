name: Bug report
description: Report a reproducible Codex Halo problem
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: Please remove prompts, source code, paths, tokens, and other private data from logs.
  - type: input
    id: version
    attributes:
      label: Halo version
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS Intel
        - macOS Apple Silicon
        - Windows 10 x64
        - Windows 11 x64
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Include the state, theme, and exact steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification output and sanitized logs
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed prompts, code, tokens, private paths, and personal data.
          required: true

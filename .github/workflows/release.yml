name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - run: pnpm install --frozen-lockfile
      - run: bash scripts/release/package-macos.sh "${GITHUB_REF_NAME#v}"
      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: dist/release/*.zip

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - run: pnpm install --frozen-lockfile
      - shell: pwsh
        run: scripts/release/package-windows.ps1 $env:GITHUB_REF_NAME.TrimStart("v")
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/release/*.zip

  publish:
    needs: [macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="docs/RELEASE_NOTES_${GITHUB_REF_NAME}.md"
          test -f "$notes"
          gh release create "$GITHUB_REF_NAME" release/*.zip \
            --title "Codex Halo $GITHUB_REF_NAME" \
            --notes-file "$notes"
